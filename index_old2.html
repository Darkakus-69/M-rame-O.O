<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Darkaku WEB Service - Enlaces Chile</title>

  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- COLOR DEL NAVEGADOR -->
  <meta name="theme-color" content="#0b2a1f">

  <link rel="canonical" href="https://darkaku-web-service.github.io/">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#070b10; /* fondo más oscuro */
      color:#e5e7eb;
    }

    .contenedor{
      max-width:1200px;
      margin:auto;
    }

    header{
      text-align:center;
      padding:25px;
      background:#0b2a1f; /* verde oscuro insecto */
      border-bottom:2px solid #22c55e;
    }

    header h1{
      margin:0;
      font-size:30px;
      letter-spacing:1px;
      color:#22c55e;
    }

    header a{
      color:#22c55e;
      text-decoration:none;
    }

    .malla{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
      gap:10px;
      padding:15px;
    }

    .item img{
      width:100%;
      border-radius:10px;
      transition:0.2s;
      border:1px solid #1f2937;
    }

    .item img:hover{
      transform:scale(1.08);
      border-color:#22c55e;
    }

    footer{
      text-align:center;
      padding:20px;
      color:#6b7280;
    }

    .foto img{
      width:100%;
      border-radius:12px;
    }
  </style>
</head>

<body>

<section class="contenedor">

  <header>
    <h1>🐞 DARKAKU WEB SERVICE</h1>
  </header>

  <div class="malla">

    <!-- SERVICIOS (igual estructura, solo estilo cambiado) -->
    <div class="item">
      <a href="https://www.bancochile.cl"><img src="img2/16.jpg"></a>
    </div>

    <div class="item">
      <a href="https://www.servipag.com"><img src="img2/15.jpg"></a>
    </div>

    <div class="item">
      <a href="https://www.google.cl"><img src="img2/17.jpg"></a>
    </div>

    <div class="item">
      <a href="https://www.youtube.com"><img src="img2/06.jpg"></a>
    </div>

  </div>

  <footer>
    Concepción - Darkaku Project
  </footer>

</section>

</body>
</html>
