<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darkaku WEB Service</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  background:#020617;
  border-bottom:2px solid #38bdf8;
}

header h1{
  margin:0;
  font-size:28px;
}

header p{
  margin:5px 0 0;
  color:#94a3b8;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

#btnServ{background:#22c55e;color:white;}
#btnOcio{background:#3b82f6;color:white;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  text-decoration:none;
  color:white;
  overflow:hidden;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
  background:#334155;
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card div{
  text-align:center;
  padding:8px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>🐞 Darkaku WEB Service</h1>
  <p>Tu portal personal de servicios y ocio</p>
</header>

<nav>
  <button id="btnServ" onclick="show('servicios')">Servicios</button>
  <button id="btnOcio" onclick="show('ocio')">Ocio</button>
</nav>

<!-- SERVICIOS -->
<div id="servicios" class="grid">

  <a class="card" href="https://www.bancochile.cl" target="_blank">
    <img src="https://source.unsplash.com/300x200/?ant">
    <div>Banco Chile</div>
  </a>

  <a class="card" href="https://www.servipag.com" target="_blank">
    <img src="https://source.unsplash.com/300x200/?beetle">
    <div>Pagos</div>
  </a>

  <a class="card" href="https://www.google.cl" target="_blank">
    <img src="https://source.unsplash.com/300x200/?insect">
    <div>Google</div>
  </a>

  <a class="card" href="https://www.meteochile.gob.cl" target="_blank">
    <img src="https://source.unsplash.com/300x200/?weather,insect">
    <div>Clima</div>
  </a>

</div>

<!-- OCIO -->
<div id="ocio" class="grid" style="display:none;">

  <a class="card" href="https://www.youtube.com" target="_blank">
    <img src="https://source.unsplash.com/300x200/?butterfly">
    <div>YouTube</div>
  </a>

  <a class="card" href="https://www.tiktok.com" target="_blank">
    <img src="https://source.unsplash.com/300x200/?dragonfly">
    <div>TikTok</div>
  </a>

  <a class="card" href="https://www.reddit.com" target="_blank">
    <img src="https://source.unsplash.com/300x200/?bug,macro">
    <div>Reddit</div>
  </a>

  <a class="card" href="https://chatgpt.com" target="_blank">
    <img src="https://source.unsplash.com/300x200/?mantis">
    <div>ChatGPT</div>
  </a>

</div>

<script>
function show(seccion){
  document.getElementById("servicios").style.display="none";
  document.getElementById("ocio").style.display="none";
  document.getElementById(seccion).style.display="grid";
}
</script>

</body>
</html>
